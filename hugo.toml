baseURL = "https://blog.rbby.dev/"
title = "rbby.dev"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
ignoreLogs = ['warning-goldmark-raw-html']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  env = "production"
  title = "rbby.dev"
  description = "A web dev's blog"
  author = "rbby"

  defaultTheme = "light"
  disableThemeToggle = false

  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowWordCount = false

[params.homeInfoParams]
  Title = "Crafting web applications and tools to help developers build better products."
  Content = """
Hey, I'm **Robby**, AKA [**rbbydotdev**](https://rbby.dev) on the internet. I'm a:

- **Full-Stack Web Application Engineer**

  I specialize in TypeScript and Go, building modern web applications with React, Next.js, and serverless architectures. I focus on creating tools and apps for power users that streamline workflows.

- **Open-Source Enthusiast**

  I maintain projects on GitHub including [Someday](https://github.com/rbbydotdev/someday) (1,001 stars) - a free calendar availability picker, and [opal](https://github.com/rbbydotdev/opal) - an offline browser-based markdown CMS. 

- and **Weirdo**

  When it comes to building, I often find unconventional and creative approaches to an end goal. This blog serves as a way to share these lessons and discoveries.
"""

[params.social]
  twitter = "rbbydotdev"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/rbbydotdev"

[[params.socialIcons]]
  name = "x"
  url = "https://x.com/rbbydotdev"

[[params.socialIcons]]
  name = "bluesky"
  url = "https://bsky.app/profile/rbby.dev"

[[menu.main]]
  identifier = "posts"
  name = "posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "tags"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "newsletter"
  name = "newsletter"
  url = "#newsletter-dialog"
  weight = 30

[[menu.main]]
  identifier = "hire-me"
  name = "hire me"
  url = "https://rbby.dev/resume"
  weight = 40

[[menu.main]]
  identifier = "rbby.dev"
  name = "rbby.dev"
  url = "https://rbby.dev"
  weight = 50


[markup.highlight]
  noClasses = false
  lineNos = false
  style = "monokai"
